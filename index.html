<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GEMS MINES - VIP FIXED</title>
    <style>
        :root { --gold: #ffd700; --blue: #00d4ff; --dark: #000c18; }
        body, html { margin: 0; padding: 0; font-family: sans-serif; background: var(--dark); color: white; height: 100%; overflow: hidden; }
        .screen { display: none; height: 100vh; width: 100%; flex-direction: column; align-items: center; justify-content: center; position: absolute; top: 0; left: 0; }
        .active { display: flex !important; }
        .box { background: rgba(0, 40, 80, 0.9); padding: 30px; border-radius: 20px; border: 2px solid var(--blue); width: 80%; max-width: 280px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 15px 0; border-radius: 8px; border: 1px solid var(--blue); background: #000; color: white; text-align: center; box-sizing: border-box; }
        .go-btn { width: 100%; padding: 12px; background: var(--blue); color: black; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; background: #0a4269; padding: 10px; border-radius: 10px; }
        .cell { width: 50px; height: 50px; background: #1a5a8a; border-radius: 5px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .cell.gem { background: #00d4ff; }
        .cell.bomb { background: #ff4d4d; }
    </style>
</head>
<body>

    <div id="screen-landing" class="screen active">
        <h1 style="color:var(--gold); font-size: 35px; margin-bottom: 30px;">GEMS MINES VIP</h1>
        <button class="go-btn" style="width:200px" onclick="goToScreen('screen-id')">دخول اللعبة</button>
    </div>

    <div id="screen-id" class="screen">
        <div class="box">
            <h2 style="color:var(--blue)">تأكيد الـ ID</h2>
            <input type="text" id="idVal" placeholder="أدخل ID المستخدم">
            <button class="go-btn" onclick="validateID()">استمرار</button>
        </div>
    </div>

    <div id="screen-pass" class="screen">
        <div class="box">
            <h2 style="color:var(--gold)">الباسورد</h2>
            <input type="password" id="passVal" placeholder="كلمة المرور">
            <button class="go-btn" style="background:var(--gold)" onclick="validatePass()">دخول</button>
        </div>
    </div>

    <div id="screen-game" class="screen">
        <div id="grid" class="grid"></div>
        <div style="margin-top:20px;">💎: <span id="s_score">0</span> | 💣: <span id="s_bombs">0</span></div>
        <button onclick="initGame()" style="margin-top:20px; padding:10px 30px; background:#28a745; color:white; border:none; border-radius:5px;">لعبة جديدة (وضع ثابت)</button>
    </div>

    <script>
        const ids = ["user1", "admin", "15711", "10020025"];

        function goToScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function validateID() {
            const v = document.getElementById('idVal').value.trim();
            if(ids.includes(v)) { goToScreen('screen-pass'); }
            else { alert("ID غير صحيح"); }
        }

        function validatePass() {
            const v = document.getElementById('passVal').value;
            if(v === "15711") { goToScreen('screen-game'); initGame(); }
            else { alert("باسورد خطأ"); }
        }

        let bombs = [];
        function initGame() {
            const g = document.getElementById('grid'); g.innerHTML = '';
            document.getElementById('s_score').innerText = '0';
            document.getElementById('s_bombs').innerText = '0';
            
            // --- التعديل هنا: القنابل في أماكن محددة ---
            // الخانة 0 (أول واحدة يمين فوق) والخانة 3 (ثاني واحدة من الشمال فوق)
            bombs = [0, 3]; 

            for(let i=0; i<25; i++) {
                let c = document.createElement('div');
                c.className = 'cell';
                c.onclick = () => {
                    if(c.innerHTML !== '') return;
                    if(bombs.includes(i)) { 
                        c.innerHTML = '💣'; 
                        c.classList.add('bomb'); 
                        document.getElementById('s_bombs').innerText = parseInt(document.getElementById('s_bombs').innerText) + 1;
                    } else { 
                        c.innerHTML = '💎'; 
                        c.classList.add('gem'); 
                        let s = document.getElementById('s_score'); 
                        s.innerText = parseInt(s.innerText)+1; 
                    }
                };
                g.appendChild(c);
            }
        }
    </script>
</body>
</html>
