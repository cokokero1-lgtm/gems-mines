<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GEMS MINES - VIP PRESTIGE</title>
    <style>
        :root {
            --gold: #ffd700;
            --electric-blue: #00d4ff;
            --bg-dark: #000c18;
            --vip-red: #ff3e3e;
        }

        body, html {
            margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-dark); color: white; overflow-x: hidden;
            display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh;
        }

        /* --- تصميم عنوان الصفحة (GEMS MINES VIP) --- */
        .main-title {
            font-size: 40px; color: var(--gold); text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
            margin-bottom: 50px; text-align: center; font-weight: bold;
            line-height: 1.2;
        }

        /* --- حاوية الأزرار --- */
        .btn-group {
            display: flex; flex-direction: column; gap: 25px; width: 85%; max-width: 320px;
        }

        /* --- زر التجربة المجانية --- */
        .btn-trial {
            background: rgba(255,255,255,0.05); border: 2px solid white; color: white;
            padding: 15px; border-radius: 12px; font-size: 16px; cursor: pointer; transition: 0.3s;
            outline: none;
        }
        .btn-trial:hover { background: rgba(255,255,255,0.15); }

        /* --- زر الـ VIP الذهبي الأسطوري --- */
        .btn-vip-gold {
            background: linear-gradient(145deg, #ffd700, #b8860b);
            border: 3px solid #fff; border-radius: 15px; padding: 18px;
            cursor: pointer; position: relative; box-shadow: 0 10px 30px rgba(255, 215, 0, 0.4);
            display: flex; align-items: center; justify-content: center; gap: 15px;
            transition: 0.4s; outline: none; border-style: solid;
        }

        .btn-vip-gold .icon-box { font-size: 35px; } /* حجم التنين */
        .btn-vip-gold .text-box { color: #000; font-weight: bold; font-size: 18px; text-align: right; }
        
        /* علامة التاج فوق الزرار */
        .crown-tag {
            position: absolute; top: -12px; left: -8px; background: var(--vip-red);
            color: white; padding: 4px 10px; border-radius: 50px; font-size: 11px; border: 1px solid white;
            font-weight: bold;
        }

        .btn-vip-gold:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 15px 40px rgba(255, 215, 0, 0.6);
        }

        /* --- شاشات الدخول (مخفية مؤقتاً) --- */
        .auth-screen {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-dark); flex-direction: column; align-items: center; justify-content: center; z-index: 100;
        }
        .auth-screen.active { display: flex; }
        .auth-box {
            background: rgba(0, 41, 75, 0.95); padding: 30px; border-radius: 20px;
            border: 2px solid var(--electric-blue); width: 85%; max-width: 300px; text-align: center;
        }
        input {
            width: 100%; padding: 12px; margin: 15px 0; border-radius: 10px;
            border: 1px solid var(--electric-blue); background: #000; color: white;
            font-size: 18px; text-align: center; box-sizing: border-box; outline: none;
        }
        .submit-btn {
            background: var(--electric-blue); color: #000; border: none; padding: 12px;
            width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer;
        }

        /* --- اللعبة --- */
        #game-screen { display: none; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
        #game-screen.active { display: flex; }
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; background: #0a4269; padding: 10px; border-radius: 10px; }
        .cell { width: 50px; height: 50px; background: #1a5a8a; border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 20px; border: 1px solid var(--electric-blue); }
        .cell.gem { background: #00d4ff; }
        .cell.bomb { background: #ff4d4d; }
    </style>
</head>
<body>

    <div id="landing-content" style="display: flex; flex-direction: column; align-items: center;">
        <h1 class="main-title">GEMS MINES VIP</h1>
        
        <div class="btn-group">
            <button class="btn-trial" onclick="showAuth('id')">تجربة مجانية لفترة محدودة</button>
            
            <div class="btn-vip-gold" onclick="showAuth('id')">
                <div class="crown-tag">PREMIUM</div>
                <div class="icon-box">🐉</div> <div class="text-box">
                    <div>VIP ACCESS</div>
                    <div style="font-size: 10px; font-weight: normal; margin-top: 2px;">MEDITATION MODE</div>
                </div>
            </div>
        </div>
    </div>

    <div id="screen-id" class="auth-screen">
        <div class="auth-box">
            <h2 style="color:var(--electric-blue)">تأكيد الهوية (ID)</h2>
            <input type="text" id="idInput" placeholder="أدخل ID المستخدم">
            <button class="submit-btn" onclick="checkID()">استمرار</button>
        </div>
    </div>

    <div id="screen-pass" class="auth-screen">
        <div class="auth-box">
            <h2 style="color:var(--gold)">دخول آمن</h2>
            <input type="password" id="passInput" placeholder="Password">
            <button class="submit-btn" style="background:var(--gold)" onclick="checkPass()">فتح المنصة</button>
        </div>
    </div>

    <div id="screen-game" class="auth-screen">
        <div style="color:var(--gold); font-size: 24px; margin-bottom: 20px;">GEMS MINES - VIP</div>
        <div id="grid" class="grid"></div>
        <div style="margin: 20px 0; font-size: 18px;">
            💎: <span id="score">0</span> | 💣: <span id="bombs">0</span>
        </div>
        <div style="display:flex; gap: 10px;">
            <button onclick="undoMove()" style="padding: 10px; background:#ffc107; color:black; border:none; border-radius:5px;">تراجع ↩</button>
            <button onclick="resetRound()" style="padding: 10px; background:#dc3545; color:white; border:none; border-radius:5px;">إعادة الدور</button>
            <button onclick="initGameFixed()" style="padding: 10px; background:#28a745; color:white; border:none; border-radius:5px;">🆕 لعبة جديدة (2 قنبلة)</button>
        </div>
    </div>

    <script>
        // قائمة الـ IDs المسموحة (تقدر تضيف هنا)
        const allowedIDs = ["user1", "admin", "15711", "10020025"];

        function showAuth(type) {
            document.getElementById('landing-content').style.display = 'none';
            document.querySelectorAll('.auth-screen').forEach(s => s.classList.remove('active'));
            if(type === 'id') document.getElementById('screen-id').classList.add('active');
        }

        function checkID() {
            const val = document.getElementById('idInput').value.trim();
            if (allowedIDs.includes(val)) {
                document.getElementById('screen-id').classList.remove('active');
                document.getElementById('screen-pass').classList.add('active');
            } else {
                alert("ID غير مسجل!");
            }
        }

        function checkPass() {
            const val = document.getElementById('passInput').value;
            if (val === "15711") {
                document.getElementById('screen-pass').classList.remove('active');
                document.getElementById('screen-game').classList.add('active');
                initGameFixed();
            } else {
                alert("باسورد خطأ!");
            }
        }

        // --- منطق اللعبة (دور ثابت للتجربة: القنابل في 0 و 3) ---
        let score = 0, bombsFound = 0, bombs = [0, 3], moveHistory = [];

        function initGameFixed() {
            const grid = document.getElementById('grid'); grid.innerHTML = '';
            score = 0; bombsFound = 0; moveHistory = [];
            document.getElementById('score').innerText = '0';
            document.getElementById('bombs').innerText = '0';
            
            for(let i=0; i<25; i++) {
                let cell = document.createElement('div');
                cell.className = 'cell';
                cell.onclick = () => {
                    if(cell.innerHTML !== '') return;
                    moveHistory.push({index: i, isBomb: bombs.includes(i)});
                    if(bombs.includes(i)) {
                        cell.innerHTML = '💣'; cell.classList.add('bomb'); bombsFound++;
                    } else {
                        cell.innerHTML = '💎'; cell.classList.add('gem'); score++;
                    }
                    document.getElementById('score').innerText = score;
                    document.getElementById('bombs').innerText = bombsFound;
                };
                grid.appendChild(cell);
            }
        }

        function undoMove() {
            if(moveHistory.length === 0) return;
            let last = moveHistory.pop();
            let cell = document.getElementById('grid').children[last.index];
            cell.innerHTML = ''; cell.classList.remove('gem', 'bomb');
            if(last.isBomb) bombsFound--; else score--;
            document.getElementById('score').innerText = score;
            document.getElementById('bombs').innerText = bombsFound;
        }

        function resetRound() {
            initGameFixed();
        }
    </script>
</body>
</html>
